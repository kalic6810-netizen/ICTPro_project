name: Basic validation

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    name: Build Java Project
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Tady schválně nepoužíváme cache, protože nemáte Maven/Gradle

      - name: Compile Java
        run: |
          mkdir bin
          javac -d bin src/*.java
